<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainiacs - Editora Futura</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyBB0NL-YEBLclVyNXFOgUv2XOE2FytXk-E",
            authDomain: "futura-ce75c.firebaseapp.com",
            projectId: "futura-ce75c",
            storageBucket: "futura-ce75c.firebasestorage.app",
            messagingSenderId: "4984728995",
            appId: "1:4984728995:web:32978b92caa1ee8d49be16"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function App() {
            const [user, setUser] = React.useState(null);
            const [alunos, setAlunos] = React.useState([]);

            React.useEffect(() => {
                auth.onAuthStateChanged(setUser);
                const unsub = db.collection('alunos').onSnapshot(snap => {
                    setAlunos(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                });
                return unsub;
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="flex items-center justify-between mb-8 bg-white p-6 rounded-2xl shadow-sm">
                        <div className="flex items-center gap-4">
                            <img src="mr brain brainiacs.png" alt="Mascote" className="w-12 h-12" />
                            <h1 className="text-2xl font-bold text-purple-900">Brainiacs</h1>
                        </div>
                        {user ? (
                            <button onClick={() => auth.signOut()} className="text-red-500 text-sm">Sair do Admin</button>
                        ) : (
                            <span className="text-xs text-gray-400">Visualização Pública</span>
                        )}
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {alunos.map(aluno => (
                            <div key={aluno.id} className="bg-white p-6 rounded-2xl shadow-sm border border-purple-100">
                                <h3 className="font-bold text-lg">{aluno.nome}</h3>
                                <p className="text-purple-600 font-black text-2xl">{aluno.pontos || 0} Brains</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
